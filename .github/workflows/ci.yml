name: jaanchlo-ci
on: [push, pull_request]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Run CI gate (engine tests + dataset integrity + eval thresholds)
        run: node engine/gate.mjs
