const RE_MASKED_ACCT = /(a\/c|acct|account).{0,8}(x{2,}|\*{2,})\d{2,4}|xxxx\d{3,4}/i;
const RE_CONSUMER_ID = /(consumer (no|id|number)|customer id|ref(erence)? no|pnr|order (no|id|number)|policy (no|number)|उपभोक्ता (संख्या|क्रमांक))/i;
const RE_OTP_DELIVERY = /(otp|one time password)[^.]{0,45}(do ?not share|never share|kisi ko na bataye|share (mat|na) kare)|(do ?not|never|don'?t) share[^.]{0,30}(otp|pin|cvv)|(delivery|courier)[^.]{0,30}otp|otp[^.]{0,30}(delivery|courier ko)/i;
const RE_NAMED = /\b(dear|hi|hello|namaste)\s+[A-Z][a-z]{2,}\b/;

function norm(t){t=t||"";return t
  .replace(/(?<=[a-z])0(?=[a-z])/gi,'o').replace(/(?<=[a-z])3(?=[a-z])/gi,'e')
  .replace(/(?<=[a-z])1(?=[a-z])/gi,'i').replace(/(?<=[a-z])!(?=[a-z])/gi,'i')
  .replace(/(?<=[a-z])\$(?=[a-z])/gi,'s').replace(/(?<=[a-z])@(?=[a-z])/gi,'a');}

};

function classify(codes){
  let best=null,bestScore=0;
  for(const k in FAMILY){
    const hit=FAMILY[k].sig.filter(s=>codes.has(s));
    let sc=0; for(const h of hit){const d=SIGNALS.find(x=>x[0]===h); sc+=d?d[2]:0;}
    if(hit.length>=2 && sc>bestScore){best=k;bestScore=sc;}
  }
  return best;
}

function detect(text){
  const t = text || ""; const n = norm(t);
  const matched = [];
  for(const [code,ev,pts,re] of SIGNALS){ if(re.test(t)||re.test(n)) matched.push({code,ev,pts}); }
  const otpDelivery = RE_OTP_DELIVERY.test(n);
  const sig = matched.filter(m=> !(m.code==="content.otp_request" && otpDelivery));
  const codes = new Set(sig.map(m=>m.code));
  const per = {E1:0,E2:0,E3:0,E4:0,E5:0};
  for(const m of sig){ per[m.ev]+=m.pts; }
  for(const k in per){ per[k]=Math.min(100,per[k]); }
  let composite=0; for(const k in per){ composite+=per[k]*EVAL_W[k]; }
  const evalsHit=Object.values(per).filter(v=>v>0).length;
  const hasAuth=[...codes].some(c=>c.startsWith("auth."));
  const hasPay=[...codes].some(c=>c.startsWith("pay."));
  let knockout=null;
  if(hasAuth && (codes.has("pay.deposit_refundable")||codes.has("pay.tax_fee_unlock"))) knockout="K1";
  else if(codes.has("fear.isolation") && codes.has("chan.video_call_official")) knockout="K2";
  else if(codes.has("content.otp_request")) knockout="K3";
  else if(codes.has("pay.qr_to_receive")) knockout="K4";
  else if(codes.has("fear.shame_threat") && hasPay) knockout="K5";
  else if(codes.has("auth.family_clone") && (codes.has("fear.isolation")||codes.has("fear.emergency_urgency")) && hasPay) knockout="K6";
  else if(codes.has("fear.digital_arrest") && (codes.has("fear.isolation")||hasPay||hasAuth)) knockout="K7";
  else if(codes.has("content.lottery_prize") && (codes.has("pay.fee_advance")||codes.has("pay.demand")||codes.has("pay.tax_fee_unlock"))) knockout="K8";
  else if(codes.has("pay.screen_share") && hasAuth) knockout="K9";
  else if(codes.has("auth.family_clone") && codes.has("chan.new_number_known_photo") && hasPay) knockout="K10";
  else if(hasAuth && codes.has("fear.isolation") && hasPay) knockout="K11";
  else if(codes.has("content.too_good_returns") && codes.has("pay.tax_fee_unlock")) knockout="K12";
  const personalized=(RE_MASKED_ACCT.test(t)||RE_CONSUMER_ID.test(t)||RE_NAMED.test(t));
  const hasLinkOrCallback=codes.has("chan.shortlink")||codes.has("chan.personal_number_official")||/click|link/i.test(n);
  let verdict, score=Math.round(composite);
  if(knockout){ verdict="danger"; score=Math.max(score,75); }
  else{
    if(composite>=60) verdict="danger";
    else if(composite>=30) verdict="care";
    else verdict="safe";
    if(verdict==="danger" && evalsHit<2) verdict="care";
    if(verdict==="danger" && personalized && !hasLinkOrCallback) verdict="care";
    if(verdict==="danger" && codes.has("auth.family_clone") && !codes.has("fear.isolation") && !codes.has("chan.new_number_known_photo")) verdict="care";
  }
  if(!knockout && verdict==="safe" && sig.length>=2){ verdict="care"; score=Math.max(score,30); }
  const maxPts=sig.reduce((m,x)=>x.code.startsWith("auth.")?m:Math.max(m,x.pts),0);
  if(!knockout && verdict==="safe" && maxPts>=50){ verdict="care"; score=Math.max(score,30); }
  const family=classify(codes);
  return {codes:[...codes], per, score, verdict, knockout, personalized, family};
}

function setLang(l){LANG=l;document.documentElement.lang=l;
  document.getElementById('lang-en').classList.toggle('on',l==='en');
  document.getElementById('lang-hi').classList.toggle('on',l==='hi');
  const u=UI[l];
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('tagline',u.tagline);set('tab-message',u.tabMessage);set('tab-call',u.tabCall);set('tab-photo',u.tabPhoto);
  set('tab-voice',u.tabVoice);set('tab-library',u.tabLibrary);set('tab-about',u.tabAbout);
  set('lbl-message',u.lblMessage);set('btn-check',u.btnCheck);set('photo-cta',u.photoCta);set('btn-photo',u.btnCheck);
  set('lbl-voice',u.lblVoice);set('btn-voice',u.btnVoice);set('btn-checklist',u.btnChecklist);
  set('helpline',u.helpline);set('disc',u.disc);set('about-text',u.about);set('foot',u.foot);
  const mic=document.getElementById('btn-mic'); if(mic && !mic.classList.contains('rec')) mic.textContent=u.mic;
  renderChecklist();renderLibrary();}
function showFlow(f){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.flow===f));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+f).classList.add('on');}
function renderChecklist(){const box=document.getElementById('checklist');if(!box)return;box.innerHTML="";
  CHECKLIST_Q[LANG].forEach(([id,q])=>{const yes=LANG==='hi'?'हाँ':'Yes',no=LANG==='hi'?'नहीं':'No';
    const d=document.createElement('div');d.className='q';
    d.innerHTML=`<p>${q}</p><div class="opts"><button class="yes ${clAnswers[id]===1?'on':''}" onclick="ans('${id}',1)">${yes}</button><button class="no ${clAnswers[id]===0?'on':''}" onclick="ans('${id}',0)">${no}</button></div>`;
    box.appendChild(d);});}
function ans(id,v){clAnswers[id]=v;renderChecklist();}
function renderLibrary(){const box=document.getElementById('libbox');if(!box)return;box.innerHTML="";
  LIB.forEach((f,i)=>{const c=f[LANG];const d=document.createElement('div');d.className='lib'+(i===0?' open':'');
    const how=LANG==='hi'?'कैसे होता है':'How it unfolds', red=LANG==='hi'?'ख़तरे के संकेत':'Red flags', act=LANG==='hi'?'क्या करें':'Do this';
    d.innerHTML=`<button onclick="this.parentElement.classList.toggle('open')">${c.t}<span>+</span></button>
      <div class="body"><h5>${how}</h5><p>${c.how}</p><h5>${red}</h5><ul>${c.red.map(r=>`<li>${r}</li>`).join('')}</ul><h5>${act}</h5><p>${c.act}</p></div>`;
    box.appendChild(d);});}

function renderVerdict(target,res){
  const rs=res.codes.slice().sort((a,b)=>{const pa=SIGNALS.find(s=>s[0]===a),pb=SIGNALS.find(s=>s[0]===b);return (pb?pb[2]:0)-(pa?pa[2]:0);})
    .slice(0,5).map(c=>REASON[LANG][c]).filter(Boolean);
  const label=TIER_LABEL[LANG][res.verdict];
  const fam=res.family?FAMILY[res.family][LANG]:null;
  const bars=["E1","E2","E3","E4","E5"].map(k=>{const v=res.per[k];const cls=v>=60?'hot':(v>=30?'warm':'');
    return `<div class="bar ${cls}"><span>${EVAL_NAME[LANG][k]}</span><div class="track"><div class="fill" style="width:${v}%"></div></div><span>${v}</span></div>`;}).join('');
  const shareTxt=encodeURIComponent((LANG==='hi'?'JaanchLo नतीजा: ':'JaanchLo result: ')+label+(fam?' ('+fam+')':'')+'. '+NEXT[LANG][res.verdict]);
  document.getElementById(target).innerHTML=`
    <div class="verdict ${res.verdict}">
      <div class="tier"><span class="dot"></span>${label}</div>
      <div class="chips"><span class="chip">${UI[LANG].scoreLbl}: ${res.score}/100</span>${fam?`<span class="chip">${UI[LANG].patternLbl}: ${fam}</span>`:''}</div>
      <div class="bars">${bars}</div>
      <ul>${rs.map(r=>`<li>${r}</li>`).join('')||'<li>'+(LANG==='hi'?'कोई स्पष्ट स्कैम संकेत नहीं मिला।':'No strong scam signals found.')+'</li>'}</ul>
      <div class="nextstep">${NEXT[LANG][res.verdict]}</div>
      <a class="share" href="https://wa.me/?text=${shareTxt}" target="_blank" rel="noopener noreferrer">${UI[LANG].share}</a>
    </div>`;}
function runMessage(){renderVerdict('out-message',detect(document.getElementById('msg').value));}
function runVoice(){renderVerdict('out-voice',detect(document.getElementById('voicetext').value));}
// Pure-rules checklist verdict: deterministic, offline, monotone (a yes can never lower the tier).
function checklistVerdict(a){
  const yes=k=>a&&a[k]===1;
  const QS=["q_auth","q_iso","q_threat","q_pay","q_prize","q_link","q_family","q_channel"];
  const nYes=QS.filter(yes).length;
  const dangerCombo=(yes("q_auth")&&yes("q_iso"))||(yes("q_iso")&&yes("q_pay"))||
    (yes("q_auth")&&yes("q_threat")&&yes("q_pay"))||(yes("q_family")&&yes("q_pay"))||
    (yes("q_prize")&&yes("q_pay"))||(yes("q_link")&&yes("q_pay"));
  let tier="safe";
  if(dangerCombo||nYes>=4) tier="danger";
  else if(nYes>=1) tier="care";
  return {tier,nYes};
}
function runChecklist(){
  let syn=[];
  if(clAnswers.q_auth)syn.push("caller claims police officer cbi bank");
  if(clAnswers.q_iso)syn.push("do not tell your family stay on camera skype video call with officer");
  if(clAnswers.q_threat)syn.push("you will be arrested case registered account blocked");
  if(clAnswers.q_pay)syn.push("transfer money refundable verification deposit share otp");
  if(clAnswers.q_prize)syn.push("congratulations you won lottery prize guaranteed daily earning");
  if(clAnswers.q_link)syn.push("download this app from the link install apk");
  if(clAnswers.q_family)syn.push("beta emergency hospital paise bhejo urgent");
  if(clAnswers.q_channel)syn.push("sudden video call from unknown international number");
  const res=detect(syn.join(". "));
  const cv=checklistVerdict(clAnswers);
  if(cv.tier==="danger"){res.verdict="danger";res.score=Math.max(res.score,75);}
  else if(cv.tier==="care"&&res.verdict==="safe"){res.verdict="care";res.score=Math.max(res.score,30);}
  else if(cv.nYes===0){res.verdict="safe";res.score=Math.min(res.score,10);}
  renderVerdict('out-call',res);}

/* -------- screenshot OCR (lazy-load tesseract.js) -------- */
let ocrReady=null;
function loadOCR(){ if(ocrReady) return ocrReady;
  ocrReady=new Promise((ok,err)=>{const s=document.createElement('script');
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";s.onload=()=>ok();s.onerror=err;document.head.appendChild(s);});
  return ocrReady;}
async function runPhoto(inp){
  const f=inp.files&&inp.files[0]; if(!f)return;
  const st=document.getElementById('ocrstat');
  st.textContent=LANG==='hi'?'टेक्स्ट पढ़ा जा रहा है... (फ़ोन पर ही)':'Reading text from the image... (on your phone)';
  try{
    await loadOCR();
    const worker=await Tesseract.createWorker('eng');
    const {data}=await worker.recognize(f);
    await worker.terminate();
    const txt=(data.text||"").trim();
    document.getElementById('phototext').value=txt;
    st.textContent=(LANG==='hi'?'पढ़ा गया टेक्स्ट नीचे है। ':'Text read from image. ')+(txt?'':'(empty)');
    if(txt) renderVerdict('out-photo',detect(txt));
  }catch(e){ st.textContent=(LANG==='hi'?'इमेज नहीं पढ़ी जा सकी, टेक्स्ट नीचे टाइप करें।':'Could not read the image. Type the text below instead.'); }
}

/* -------- voice input (Web Speech API, graceful fallback) -------- */
let rec=null,recOn=false;
function initMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return; const b=document.getElementById('btn-mic'); b.style.display='block'; b.textContent=UI[LANG].mic;
  rec=new SR(); rec.continuous=true; rec.interimResults=true;
  rec.onresult=(e)=>{let t="";for(const r of e.results){t+=r[0].transcript+" ";}document.getElementById('voicetext').value=t.trim();};
  rec.onend=()=>{recOn=false;b.classList.remove('rec');b.textContent=UI[LANG].mic;};}
function toggleMic(){const b=document.getElementById('btn-mic'); if(!rec)return;
  if(recOn){rec.stop();recOn=false;b.classList.remove('rec');b.textContent=UI[LANG].mic;}
  else{rec.lang=LANG==='hi'?'hi-IN':'en-IN';try{rec.start();recOn=true;b.classList.add('rec');b.textContent=UI[LANG].micStop;}catch(e){}}}

function renderSelfTest(){

  el.style.display='block';
  let rows="",pass=0;
  TESTS.forEach((tc,i)=>{const r=detect(tc[0]);const ok=r.verdict===tc[1];if(ok)pass++;
    rows+=`<tr><td>${i+1}</td><td>${tc[2]}</td><td>${tc[1]}</td><td>${r.verdict} (${r.score})${r.knockout?' '+r.knockout:''}</td><td class="${ok?'pass':'fail'}">${ok?'PASS':'FAIL'}</td></tr>`;});
  const all=pass===TESTS.length;
  el.innerHTML=`<div class="banner ${all?'ok':'bad'}" id="selftest-banner">${pass} / ${TESTS.length} ${all?'ALL PASS':'FAILING'}</div>
    <table><thead><tr><th>#</th><th>case</th><th>expected</th><th>got</th><th>result</th></tr></thead><tbody>${rows}</tbody></table>
    <p style="margin-top:16px"><button class="btn sec" style="max-width:320px" onclick="location.hash='';location.reload();">Back to app</button></p>`;}
